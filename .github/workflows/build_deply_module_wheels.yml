name: Build and Deploy Module Wheels

on:
  push:
    branches: [scalable_ingestion]
    paths:
      - 'Databricks/notebooks/modules/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build databricks-cli

      - name: Build and upload wheels
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          # Find every pyproject.toml under modules/ and build each one
          find Databricks/notebooks/modules -name "pyproject.toml" | while read pyproject; do
            module_dir=$(dirname "$pyproject")
            module_name=$(basename "$module_dir")

            echo "Building wheel for: $module_name"
            python -m build --wheel "$module_dir"

            # Upload to /Shared/modules/<module_name>/
            dbfs cp --overwrite \
              "$module_dir/dist/"*.whl \
              "dbfs:/Shared/modules/$module_name/"

            echo "Uploaded $module_name wheel to dbfs:/Shared/modules/$module_name/"
          done