name: Build and Deploy Module Wheels

on:
  push:
    branches: [main]
    paths:
      - 'explorations/notebooks/modules/**'
    # Adds a "Run workflow" button in the GitHub Actions UI
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build wheels
        run: |
          find explorations/notebooks/modules -name "pyproject.toml" | while read pyproject; do
            module_dir=$(dirname "$pyproject")
            module_name=$(basename "$module_dir")

            echo "Building wheel for: $module_name"
            python -m build --wheel "$module_dir"
          done

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Upload wheels to DBFS
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          find explorations/notebooks/modules -name "pyproject.toml" | while read -r pyproject; do
            module_dir=$(dirname "$pyproject")
            module_name=$(basename "$module_dir")

            echo "Processing module: $module_name"
            
            # Target path inside your Databricks Workspace Shared folder
            target_dir="/Workspace/Shared/modules/$module_name"
            
            # Ensure the subfolder path exists in the Workspace
            databricks workspace mkdirs "$target_dir"

            # Loop to process each wheel file individually
            for whl in "$module_dir/dist/"*.whl; do
              [ -e "$whl" ] || continue
              
              whl_filename=$(basename "$whl")
              echo "Uploading wheel to Workspace: $whl_filename"
              
              databricks workspace import \
                --format AUTO \
                --file "$whl" \
                --overwrite \
                "$target_dir/$whl_filename"
            done

            echo "✅ Finished uploading for $module_name"
            echo "----------------------------------------"
          done
