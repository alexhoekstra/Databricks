# This is a Databricks asset bundle definition for daily_capitals_weather.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: daily_capitals_weather
  uuid: 3a43d1c2-cd34-4359-ac4f-fb00ff1b011f

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-97f240ad-c636.cloud.databricks.com
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-97f240ad-c636.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/alex.hoekstra618+databricks@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/alex.hoekstra618+databricks@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: alex.hoekstra618+databricks@gmail.com
        level: CAN_MANAGE
