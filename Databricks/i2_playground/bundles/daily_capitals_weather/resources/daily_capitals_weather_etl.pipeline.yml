# The main pipeline for daily_capitals_weather

resources:
  pipelines:
    daily_capitals_weather_etl:
      name: daily_capitals_weather_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/daily_capitals_weather_etl"

      libraries:
        - glob:
            include: ../src/daily_capitals_weather_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
          - ../dist/*.whl
          - kagglehub
