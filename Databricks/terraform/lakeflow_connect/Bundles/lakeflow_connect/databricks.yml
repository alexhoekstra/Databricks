# Databricks Asset Bundle for the lakeflow_connect CDC ingestion pipeline.
#
# Owns the cdc_bronze_ingest wheel build + the per-domain bronze schema and
# ingestion job. The per-domain resource files (resources/*.gen.yml) are
# GENERATED by Terraform (Databricks/terraform/lakeflow_connect/ingestion) so the
# domain list stays single-sourced in terraform.tfvars.
#
# Deploy AFTER `terraform apply` in the ingestion root:
#   databricks bundle deploy -t dev
# See https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: lakeflow_connect
  uuid: 22620c60-9208-452f-ae83-d720100901bf

include:
  - resources/*.yml

# Build the shared cdc_bronze_ingest wheel from ./cdc_bronze_ingest (vendored
# inside this bundle). The generated job files reference the resulting dist/*.whl
# as a serverless dependency.
artifacts:
  cdc_bronze_ingest:
    type: whl
    path: ./cdc_bronze_ingest
    build: uv build --wheel

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-97f240ad-c636.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-97f240ad-c636.cloud.databricks.com
      root_path: /Workspace/Users/alex.hoekstra618+databricks@gmail.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: alex.hoekstra618+databricks@gmail.com
        level: CAN_MANAGE
