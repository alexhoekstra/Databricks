version: '3.8'

networks:
  vault_net:
    driver: bridge

services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault-dev
    ports:
      - "8200:8200"
    volumes:
      # Mounts the data folder where secrets are securely saved
      - "C:\\Users\\alexh\\OneDrive\\Documents\\Vault\\data:/vault/data"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - vault_net

  terraform:
    image: ubuntu-terraform:latest
    container_name: terraform
    command: sleep infinity
    env_file:
      - .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${SECRET_VAULT_TOKEN}
    networks:
      - vault_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "C:/Users/alexh/OneDrive/Documents/Terraform/:/workspace"