[tool.pylint.typecheck]
additional-builtins = ["dbutils", "spark", "pytest"]

[tool.pyright]
reportUndefinedVariable = "none"
reportMissingImports = "none"       # Prevents missing PySpark library errors
reportGeneralTypeIssues = "none"

[tool.pylint.main]
ignore-paths = ["^explorations/bundles/my_first_bundle/.*", "^explorations/bundles/daily_capitals_weather/tests/.*" ]
ignored-modules = ["databricks.sdk.runtime", "dbutils", "spark", "kaggle", "kagglehub", "daily_capitals_weather.taxis", "daily_capitals_weather"]